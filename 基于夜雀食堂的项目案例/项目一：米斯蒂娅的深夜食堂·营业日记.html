<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>米斯蒂娅的深夜食堂·营业日记</title>
</head>

<body>
    <header>
        <!-- 大标题一看就是H1 -->
        <h1>米斯蒂娅的深夜食堂·营业日记</h1>
        <!-- 这里的小字是一个完整的段落，用p -->
        <p>这里是夜雀食堂的日常记录。今天也是努力营业的一天!</p>
    </header>

    <!-- 今日特供与吐槽、驻场表演这两部分文字大小差不多，就都安排在main里 -->
    <main>
        <h2>今日特供与吐槽</h2>
        <h3>今日主推：烤八目鳗</h3>
        <p><em>明明火候掌握得堪称完美，为什么客人说味道一般，真是挑剔啊</em></p>
        <span>售价：28元</span>
        <!-- 这里的缝隙明显与上面的不同，所以用br换行。此外，这部分的售价与备注不是一段话，没有合适的语义标签，所以选用span标签。 -->
        <br>
        <span>备注：再用奇怪的眼神把你变成鸟目</span>
        <!-- hr是换行线 -->
        <hr>
        <h2>关于驻唱表演的碎碎念</h2>
        <h3>今晚的歌单安排</h3>
        <p>本来想尝试一下那首<delete>绝对会跑调的高音</delete>新歌，还是老老实实唱大家喜欢的老歌吧。</p>
        <span>虽然我的歌声能让人精神百倍，但偶尔也会有人捂着耳朵逃跑哼。
            <br> 他们一定是不懂得欣赏真正的艺术。</span>

    </main>

    <footer>
        <h3>店长备忘录</h3>
        <p>明天记得去妖怪之山进购新鲜的蘑菇和竹笋</p>
        <h4>心情指数</h4>
        <p>今天赚到了不少铜币，勉强算是开心的一天吧！</p>
    </footer>
</body>

</html>
